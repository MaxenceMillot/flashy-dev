<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Flashcards V3</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div>🌿 Flashcards V3</div>

    <div class="header-actions">
        <a href="add.html" class="link-btn">➕ Add cards</a>

        <button onclick="goHome()">Home</button>
        <button onclick="resetProgress()">Reset</button>
        <button onclick="toggleStats()">Stats</button>
    </div>
</header>

<div class="container">

<!-- STUDY -->
<div id="study">

    <div class="card" id="card">
        <img id="img" alt="flashcard image">
        <div class="answer" id="answer"></div>
    </div>

    <div class="buttons">
        <button class="btn-show" onclick="showAnswer()">Show</button>
        <button class="fail" onclick="grade(1)">Failed</button>
        <button class="partial" onclick="grade(3)">Partial</button>
        <button class="hard" onclick="grade(4)">Hard</button>
        <button class="easy" onclick="grade(5)">Easy</button>
    </div>

</div>

<!-- DECKS -->
<div class="decks" id="deckContainer"></div>

<!-- STATS -->
<div id="stats" class="stats"></div>

</div>

<script src="cards.js"></script>
<script src="app.js"></script>

</body>
</html>
