<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#222222">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon_32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/icons/icon_16.png">
    <link rel="icon" href="images/icons/favicon.ico">
    <link rel="apple-touch-icon" href="images/icons/icon_192.png">

    <title>Flashy</title>
</head>

<body>
<header class="app-header">
    
    <div class="header-left">
        <img class="logo" src="images/icons/icon_192.png" alt="Flashy logo">
        <div class="title">Flashy</div>
    </div>

    <div class="header-right">
        <button class="info-btn">Info</button>

        <button class="hamburger" id="menuBtn" aria-label="menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

</header>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
    <button class="mobile-item">Info</button>
</div>

<div class="container">

    <div id="study">

        <div class="card" id="card">
            <div class="image-wrapper">
                <img id="img" alt="flashcard image">
                <div class="image-skeleton"></div>
            </div>
            <div class="answer" id="answer"></div>
        </div>

        <div class="buttons">
            <button id="btnShow" class="btn-show">Voir la réponse</button>

            <div id="gradeButtons" style="display:none;">
                <button class="fail" data-grade="1">Raté</button>
                <button class="partial" data-grade="3">Presque</button>
                <button class="correct" data-grade="5">Correct</button>
            </div>
        </div>

    </div>

    <h2>Choix des cartes</h2>
    <div class="decks" id="deckContainer"></div>

    <button id="resetBtn" class="reset">Reset</button>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
