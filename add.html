<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Cards</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div>➕ Add Cards</div>
    <a href="index.html" onclick="window.location.href='index.html'; return false;">
        🏠 Study
    </a>

</header>

<div class="container">

<div class="card">

    <h3>Create new flashcard</h3>

    <!-- IMAGE INPUT -->
    <input type="file" id="imgInput" accept="image/*">

    <br><br>

    <!-- DECK SELECT -->
    <label>Deck:</label>
    <select id="deck">
        <option value="flowers">Flowers</option>
        <option value="biology">Biology</option>
    </select>

    <br><br>

    <!-- NAME -->
    <input id="name" placeholder="Generic name (e.g. rose)" style="width:90%;padding:10px;">

    <br><br>

    <!-- LATIN NAME OPTIONAL -->
    <input id="latin" placeholder="Latin name (optional)" style="width:90%;padding:10px;">

    <br><br>

    <button onclick="createCard()">Generate card</button>

    <div id="preview" style="margin-top:20px;"></div>

</div>

</div>

<script>
// ============================
// FUTURE STORAGE PLACEHOLDER
// ============================
//
// In V4 you will likely replace this with:
// - localStorage append
// - or direct injection into cards array
// - or export to cards.js file generator
//
// Example target structure:
// {
//   id,
//   deck,
//   img,
//   text,
//   latin,
//   EF, interval, repetitions, due
// }
// ============================


window.createCard = function(){

    let file = document.getElementById("imgInput").files[0];
    let name = document.getElementById("name").value.trim();
    let latin = document.getElementById("latin").value.trim();
    let deck = document.getElementById("deck").value;

    if(!file){
        alert("Please select an image");
        return;
    }

    if(!name){
        alert("Please enter a name");
        return;
    }

    let imgURL = URL.createObjectURL(file);
    let id = name.replace(/\s+/g,'_') + "_" + Date.now();

    let card = {
        id,
        deck,
        img: imgURL,
        text: name,
        latin: latin || null,
        EF: 2.5,
        interval: 0,
        repetitions: 0,
        due: 0,
        score: 0,
        custom: true
    };

    console.log("Generated card:", card);

    // ==========================
    // SUCCESS MESSAGE
    // ==========================
    const preview = document.getElementById("preview");

    preview.innerHTML = `
        <div style="
            background:#2ecc71;
            color:white;
            padding:12px;
            border-radius:10px;
            margin-bottom:10px;
            font-weight:bold;
        ">
            ✅ Card created successfully!
        </div>

        <div class="stat-card">
            <img src="${imgURL}" style="max-width:100%;border-radius:10px;">
            <p><b>${name}</b></p>
            ${latin ? `<p><i>${latin}</i></p>` : ""}
            <p>Deck: ${deck}</p>
        </div>
    `;

    // ==========================
    // CLEAR FORM FIELDS
    // ==========================
    document.getElementById("imgInput").value = "";
    document.getElementById("name").value = "";
    document.getElementById("latin").value = "";
    document.getElementById("deck").selectedIndex = 0;

    // Optional: revoke memory of image (cleaner)
    setTimeout(() => URL.revokeObjectURL(imgURL), 2000);
};

</script>

</body>
</html>
