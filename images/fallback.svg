<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f4f6fb"></rect>

  <!-- Flower -->
  <g transform="translate(200,140)">
    
    <!-- Petals -->
    <circle cx="0" cy="-40" r="25" fill="#ff7aa2"></circle>
    <circle cx="35" cy="-20" r="25" fill="#ff7aa2"></circle>
    <circle cx="35" cy="20" r="25" fill="#ff7aa2"></circle>
    <circle cx="0" cy="40" r="25" fill="#ff7aa2"></circle>
    <circle cx="-35" cy="20" r="25" fill="#ff7aa2"></circle>
    <circle cx="-35" cy="-20" r="25" fill="#ff7aa2"></circle>

    <!-- Center -->
    <circle cx="0" cy="0" r="18" fill="#ffd166"></circle>

    <!-- Stem -->
    <rect x="-3" y="40" width="6" height="60" fill="#4caf50"></rect>

    <!-- Leaves -->
    <ellipse cx="-18" cy="75" rx="12" ry="6" fill="#66bb6a" transform="rotate(-25)"></ellipse>
    <ellipse cx="18" cy="85" rx="12" ry="6" fill="#66bb6a" transform="rotate(25)"></ellipse>

  </g>

  <!-- Text -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#888">
    Image not found
  </text>

</svg>